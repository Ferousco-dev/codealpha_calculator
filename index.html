<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassy Calculator</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #000033, #000066, #000099);
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(0, 200, 255, 0.8);
    }

    .calculator {
      width: 380px;
      padding: 25px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 200, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      animation: pulseGlow 5s infinite alternate;
    }

    @keyframes pulseGlow {
      from {
        box-shadow: 0 0 25px rgba(0, 200, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1);
      }
      to {
        box-shadow: 0 0 50px rgba(0, 200, 255, 0.9), inset 0 0 25px rgba(255, 255, 255, 0.2);
      }
    }

    .display {
      height: 70px;
      margin-bottom: 25px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 1.6rem;
      padding: 15px;
      text-align: right;
      overflow-x: auto;
      box-shadow: inset 0 0 15px rgba(0, 200, 255, 0.6);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    button {
      height: 65px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, box-shadow 0.3s;
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.4);
    }

    button:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 25px rgba(0, 200, 255, 0.8);
    }

    button:active {
      transform: scale(0.95);
      box-shadow: 0 0 30px rgba(0, 255, 150, 1);
    }

    .span-two {
      grid-column: span 2;
      border-radius: 40px;
    }

    footer {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CALCULATOR</h1>
    <div class="calculator">
      <div id="display" class="display">0</div>
      <div class="buttons">
        <button onclick="clearDisplay()">CLR</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="appendOperator('/')">÷</button>
        <button onclick="appendOperator('*')">×</button>

        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button onclick="appendOperator('-')">−</button>

        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button onclick="appendOperator('+')">+</button>

        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button onclick="calculate()">=</button>

        <button class="span-two" onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
      </div>
    </div>
    <footer>
      Powered by Ferous © <span id="year"></span>
    </footer>
  </div>

  <script>
    const display = document.getElementById('display');
    let currentInput = '';

    function updateDisplay() {
      display.textContent = currentInput || '0';
      try {
        if (currentInput) {
          let result = eval(currentInput);
          if (result !== undefined) {
            display.textContent = currentInput + " = " + result;
          }
        }
      } catch {
      }
    }

    function appendNumber(num) {
      currentInput += num;
      updateDisplay();
    }

    function appendOperator(op) {
      if (currentInput === '') return;
      currentInput += op;
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '';
      updateDisplay();
    }

    function backspace() {
      currentInput = currentInput.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      try {
        currentInput = eval(currentInput).toString();
        updateDisplay();
      } catch {
        display.textContent = "Error";
      }
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (!isNaN(e.key) || e.key === '.') {
        appendNumber(e.key);
      } else if (['+', '-', '*', '/'].includes(e.key)) {
        appendOperator(e.key);
      } else if (e.key === 'Enter') {
        calculate();
      } else if (e.key === 'Backspace') {
        backspace();
      } else if (e.key.toLowerCase() === 'c') {
        clearDisplay();
      }
    });

    // Auto-update footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    updateDisplay();
  </script>
</body>
</html>
